name: build dev docker image

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-docker-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/frederikemmer/medialyze
  PACKAGE_NAME: medialyze

jobs:
  publish_dev_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve dev image version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch origin main --depth=1

          main_branch_version="$(git show origin/main:Dockerfile | sed -n 's/^ARG APP_VERSION=//p' | head -n 1)"

          owner_type="$(gh api "/users/${GITHUB_REPOSITORY_OWNER}" --jq '.type')"
          if [[ "${owner_type}" == "Organization" ]]; then
            package_endpoint="/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100"
          else
            package_endpoint="/users/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100"
          fi

          tags_file="$(mktemp)"
          error_file="$(mktemp)"
          trap 'rm -f "${tags_file}" "${error_file}"' EXIT

          if ! gh api --paginate "${package_endpoint}" --jq '.[].metadata.container.tags[]?' >"${tags_file}" 2>"${error_file}"; then
            if grep -q "404" "${error_file}"; then
              : >"${tags_file}"
            else
              cat "${error_file}" >&2
              exit 1
            fi
          fi

          released_base_version="$(
            grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' "${tags_file}" | sort -V | tail -n 1 || true
          )"

          if [[ -n "${released_base_version}" ]]; then
            base_version="${released_base_version}"
          else
            base_version="${main_branch_version}"
          fi

          if [[ -z "${base_version}" ]]; then
            echo "Unable to determine a base version from GHCR or origin/main:Dockerfile" >&2
            exit 1
          fi

          if [[ ! "${base_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Base version '${base_version}' is not valid semver (x.y.z)." >&2
            exit 1
          fi

          max_suffix=0
          version_pattern="^${base_version//./\\.}-dev([0-9]+)$"

          while IFS= read -r tag; do
            if [[ "${tag}" =~ ${version_pattern} ]]; then
              suffix_value=$((10#${BASH_REMATCH[1]}))
              if (( suffix_value > max_suffix )); then
                max_suffix="${suffix_value}"
              fi
            fi
          done < "${tags_file}"

          next_suffix=$((max_suffix + 1))
          dev_version="$(printf '%s-dev%03d' "${base_version}" "${next_suffix}")"

          echo "base_version=${base_version}" >> "${GITHUB_OUTPUT}"
          echo "version=${dev_version}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.version.outputs.version }}" \
            -t "${IMAGE_NAME}:dev" \
            -t "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            .

          docker push "${IMAGE_NAME}:dev"
          docker push "${IMAGE_NAME}:${{ steps.version.outputs.version }}"
