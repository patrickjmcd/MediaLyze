name: build dev docker image

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-docker-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/frederikemmer/medialyze

jobs:
  publish_dev_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve dev image version
        id: version
        run: |
          set -euo pipefail

          git fetch origin main --depth=1
          git fetch --tags origin

          main_branch_version="$(
            git show origin/main:Dockerfile \
              | sed -n 's/^ARG APP_VERSION=//p' \
              | tail -n 1
          )"

          latest_release_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -n "${latest_release_tag}" ]]; then
            base_version="${latest_release_tag#v}"
            base_commit="$(git rev-list -n 1 "${latest_release_tag}")"
          else
            base_version="${main_branch_version}"
            base_commit="$(git merge-base HEAD origin/main)"
          fi

          if [[ -z "${base_version}" ]]; then
            echo "Unable to determine a base version from Git tags or origin/main:Dockerfile" >&2
            exit 1
          fi

          if [[ ! "${base_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Base version '${base_version}' is not valid semver (x.y.z)." >&2
            exit 1
          fi

          commits_since_base="$(git rev-list --count "${base_commit}..HEAD")"
          if (( commits_since_base < 1 )); then
            commits_since_base=1
          fi

          dev_version="$(printf '%s-dev%03d' "${base_version}" "${commits_since_base}")"

          echo "base_version=${base_version}" >> "${GITHUB_OUTPUT}"
          echo "version=${dev_version}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.version.outputs.version }}" \
            -t "${IMAGE_NAME}:dev" \
            -t "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            .

          docker push "${IMAGE_NAME}:dev"
          docker push "${IMAGE_NAME}:${{ steps.version.outputs.version }}"
