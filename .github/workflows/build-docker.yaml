name: publish official release
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/frederikemmer/medialyze

jobs:
  publish_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release metadata
        run: python3 .github/scripts/release_metadata.py validate --tag-ref "${GITHUB_REF}"

      - name: Resolve release version
        id: version
        run: echo "version=$(python3 .github/scripts/release_metadata.py version)" >> "$GITHUB_OUTPUT"

      - name: Log release target
        run: echo "Publishing version ${{ steps.version.outputs.version }} from ${GITHUB_REF_NAME}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.version.outputs.version }}" \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            .
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ steps.version.outputs.version }}"

      - name: Extract release notes
        run: python3 .github/scripts/release_metadata.py release-notes --version "${{ steps.version.outputs.version }}" > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "MediaLyze ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
