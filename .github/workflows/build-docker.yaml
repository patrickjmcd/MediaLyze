name: auto docker image building/publishing
on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile_temp_off'

permissions:
  contents: read
  packages: write

jobs:
  publish_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Read image version
        id: version
        run: echo "version=$(grep -E '^ARG APP_VERSION=' Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.version.outputs.version }}" \
            -t ghcr.io/frederikemmer/MediaLyze:latest \
            -t ghcr.io/frederikemmer/MediaLyze:${{ steps.version.outputs.version }} \
            .
          docker push ghcr.io/frederikemmer/MediaLyze:latest
          docker push ghcr.io/frederikemmer/MediaLyze:${{ steps.version.outputs.version }}
