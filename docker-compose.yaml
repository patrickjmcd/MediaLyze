services:
  fe_library:
    image: MediaLyze:local
    container_name: MediaLyze
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "${APP_PORT:-8008}:${APP_PORT:-8008}"
      - "${API_PORT:-8009}:${API_PORT:-8009}"
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-8009}
      APP_PORT: ${APP_PORT:-8008}
      APP_URL: ${LOCAL_APP_URL:-http://localhost:8008}
      COOKIE_SECURE: "false"
      DATA_DIR: /data
      LIBRARY_DIR: /library
    volumes:
      - ${DATA_HOST_DIR:-./data}:/data
      - ${LIBRARY_HOST_DIR:-./library}:/library
